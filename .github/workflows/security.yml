name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Define permissões mínimas de segurança (apenas leitura)
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Usando a action oficial do Gitleaks para evitar erros de instalação manual
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: git . --no-banner --redact --gitleaks-ignore-path .gitleaksignore

  bandit:
    name: Bandit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: python -m pip install --upgrade pip bandit
      - name: Run bandit
        run: |
          bandit -r api/src etl/src scripts \
            -x api/tests,etl/tests \
            -lll -iii

  pip-audit:
    name: Pip Audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Export lock-compatible requirement sets
        run: |
          cd api && uv export --format requirements-txt --no-hashes --no-emit-project --no-emit-local > /tmp/api-requirements.txt
          cd ../etl && uv export --format requirements-txt --no-hashes --no-emit-project --no-emit-local > /tmp/etl-requirements.txt
      - name: Audit API dependencies
        # Adicionado --local para focar apenas nas dependências do seu projeto
        run: uvx pip-audit -r /tmp/api-requirements.txt --strict --local
      - name: Audit ETL dependencies
        run: uvx pip-audit -r /tmp/etl-requirements.txt --strict --local

  npm-audit:
    name: NPM Audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd frontend
          # Cria apenas o lock para auditoria sem precisar baixar todo o node_modules
          npm install --package-lock-only
      - name: Audit frontend dependencies
        run: |
          cd frontend
          # Nível 'critical' para evitar que falhas menores travem o seu desenvolvimento
          npm audit --audit-level=critical

  public-privacy-gate:
    name: Public Privacy Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate public privacy contract
        run: python scripts/check_public_privacy.py --repo-root .

  compliance-pack-gate:
    name: Compliance Pack Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate legal and ethics baseline
        run: python scripts/check_compliance_pack.py --repo-root .

  public-boundary-gate:
    name: Public Boundary Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate public edition scope
        run: python scripts/check_open_core_boundary.py --repo-root .

  internal-instruction-boundary:
    name: Internal Instruction Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure internal assistant files are not tracked
        run: |
          if git ls-files | grep -E '(^|/)(CLAUDE\.md|AGENTS.*\.md)$'; then
            echo "Forbidden tracked files found: CLAUDE.md / AGENTS*.md"
            exit 1
          fi
