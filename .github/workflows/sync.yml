name: 'Sincronização Automática - BR-ACC'

on:
  schedule:
    - cron: '0 0 * * *' # Roda todos os dias à meia-noite (UTC)
  workflow_dispatch:   # Permite execução manual

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sincronizar commits do repositório original
    
    # CRUCIAL: Permite que a Action grave no seu repositório
    permissions:
      contents: write
      
    env:
      # Garante compatibilidade com o ambiente do GitHub em 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Etapa 1: Checkout do seu repositório (o fork)
      - name: Checkout target repo
        uses: actions/checkout@v4 # Atualizado para v4
        with:
          ref: main 
          persist-credentials: true # Alterado para true

      # Etapa 2: Sincronização com o repositório original (upstream)
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3 # Atualizado para v3.4.3
        with:
          target_sync_branch: main 
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main 
          upstream_sync_repo: brunoclz/br-acc 
          
      # Etapa 3: Log de confirmação
      - name: Verificar novos commits
        if: steps.sync.outputs.has_new_commits == 'true'
        run: echo "Novas atualizações foram sincronizadas com sucesso!"
